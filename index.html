<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>心映好事 — 靜心空間</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#0d0a12; cursor:none; }
#scene { position:fixed; inset:0; overflow:hidden; }
#panorama { position:absolute; top:0; left:0; height:100%; display:flex; will-change:transform; }
.panel { position:relative; height:100%; flex-shrink:0; }
.panel img { height:100%; width:auto; display:block; }
#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:10;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(8,5,15,0.35) 70%,rgba(5,3,10,0.75) 100%);
}
#edge-mask {
  position:fixed; inset:0; pointer-events:none; z-index:11;
  background:linear-gradient(180deg,rgba(8,5,15,0.6) 0%,transparent 10%,transparent 90%,rgba(8,5,15,0.6) 100%);
}
#canvas { position:fixed; inset:0; pointer-events:none; z-index:20; }
#brand { position:fixed; top:24px; right:28px; z-index:50; pointer-events:none; }
#brand img { width:72px; opacity:0; filter:brightness(0) invert(1); transition:opacity 2s ease; }
#guide { position:fixed; bottom:36px; left:50%; transform:translateX(-50%); z-index:50; pointer-events:none; text-align:center; opacity:0; transition:opacity 2s ease; }
#guide-text {
  font-family:'Georgia','宋體',serif; font-size:12px; letter-spacing:5px;
  color:rgba(255,245,250,0.55); white-space:nowrap;
  animation:breathe 5s ease-in-out infinite;
}
@keyframes breathe {
  0%,100%{opacity:0.4;transform:translateY(0);}
  50%{opacity:0.7;transform:translateY(-3px);}
}
#season-dots {
  position:fixed; bottom:68px; left:50%; transform:translateX(-50%);
  z-index:50; display:flex; gap:8px; pointer-events:none;
  opacity:0; transition:opacity 2s ease;
}
.dot { width:3px; height:3px; border-radius:50%; background:rgba(255,245,250,0.2); transition:background 1.5s ease,transform 1.5s ease; }
.dot.active { background:rgba(255,245,250,0.6); transform:scale(1.4); }
#pause-hint {
  position:fixed; top:24px; left:28px; z-index:50;
  font-family:'Georgia',serif; font-size:10px; letter-spacing:3px;
  color:rgba(255,245,250,0.2); pointer-events:none;
  opacity:0; transition:opacity 2s ease;
}
#cursor {
  position:fixed; width:5px; height:5px; border-radius:50%;
  background:rgba(255,240,255,0.35); pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div id="scene"><div id="panorama"></div></div>
<div id="vignette"></div>
<div id="edge-mask"></div>
<canvas id="canvas"></canvas>

<div id="brand"><img src="images/logo.svg" alt="心映好事"></div>
<div id="season-dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
<div id="guide"><div id="guide-text">讓自己慢下來，再抽一張牌</div></div>
<div id="pause-hint">點擊暫停</div>
<div id="cursor"></div>

<script>
// ═══════════════════════════════════════
// 圖片清單
// ═══════════════════════════════════════
const IMAGES = [
  {file:'spring1.jpg',season:'spring'},
  {file:'spring2.jpg',season:'spring'},
  {file:'spring3.jpg',season:'spring'},
  {file:'spring4.jpg',season:'spring', next:'summer'},
  {file:'summer1.jpg',season:'summer'},
  {file:'summer2.jpg',season:'summer'},
  {file:'summer3.jpg',season:'summer'},
  {file:'summer4.jpg',season:'summer', next:'autumn'},
  {file:'autumn1.jpg',season:'autumn'},
  {file:'autumn2.jpg',season:'autumn'},
  {file:'autumn3.jpg',season:'autumn'},
  {file:'autumn4.jpg',season:'autumn', next:'winter'},
  {file:'winter1.jpg',season:'winter'},
  {file:'winter2.jpg',season:'winter'},
  {file:'winter3.jpg',season:'winter'},
  {file:'winter4.jpg',season:'winter', next:'spring'},
];

const FALLBACK = {
  spring:'linear-gradient(160deg,#e8d0e8,#f5e0f5,#dcc8e4)',
  summer:'linear-gradient(160deg,#1a1540,#2a2060,#151030)',
  autumn:'linear-gradient(160deg,#c89840,#d4b870,#b07820)',
  winter:'linear-gradient(160deg,#d8e8f4,#eaf4ff,#c8dcea)',
};

// ═══════════════════════════════════════
// 建立全景
// ═══════════════════════════════════════
const panorama = document.getElementById('panorama');
[...IMAGES,...IMAGES].forEach((item,i)=>{
  const panel = document.createElement('div');
  panel.className='panel';
  panel.dataset.idx = i%IMAGES.length;
  panel.dataset.season = item.season;
  if(item.next) panel.dataset.next = item.next;
  const img = new Image();
  img.src=`images/${item.file}`;
  img.alt=item.season;
  img.style.cssText='height:100%;width:auto;display:block;';
  img.onerror=()=>{
    img.remove();
    panel.style.cssText+=`width:${window.innerWidth}px;background:${FALLBACK[item.season]};`;
  };
  panel.appendChild(img);
  panorama.appendChild(panel);
});

// ═══════════════════════════════════════
// Canvas 粒子系統
// ═══════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 粒子池
let particles = [];
let targetSeason = 'spring';
let activeSeason = 'spring';
let seasonAlpha = 1; // 淡入淡出用

// ── 蝴蝶（春）────────────────────────
class Butterfly {
  constructor(){
    this.reset(true);
  }
  reset(init=false){
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : -20;
    this.vx = (Math.random()-0.5) * 0.8; // 橫向速度
    this.vy = 0.3 + Math.random() * 0.5;  // 向下緩慢
    this.wingPhase = Math.random() * Math.PI * 2;
    this.wingSpeed = 0.08 + Math.random() * 0.05;
    this.size = 5 + Math.random() * 5;
    this.color = `hsla(${330+Math.random()*40},${60+Math.random()*20}%,${70+Math.random()*15}%,`;
    this.sinAmp = 30 + Math.random() * 30;   // 左右搖擺幅度
    this.sinFreq = 0.01 + Math.random() * 0.01;
    this.originX = this.x;
    this.t = Math.random() * 1000;
    this.opacity = 0;
    this.fadeIn = 0.005 + Math.random()*0.005;
  }
  update(){
    this.t += 1;
    this.wingPhase += this.wingSpeed;
    // 蝴蝶飛行：正弦橫移 + 緩慢向前（向下）
    this.x = this.originX + Math.sin(this.t * this.sinFreq) * this.sinAmp;
    this.y += this.vy;
    this.originX += this.vx * 0.3;
    this.opacity = Math.min(1, this.opacity + this.fadeIn);
    if(this.y > canvas.height + 30) this.reset();
    // 邊界反彈
    if(this.originX < -50) this.originX = canvas.width + 50;
    if(this.originX > canvas.width + 50) this.originX = -50;
  }
  draw(){
    const alpha = this.opacity * seasonAlpha;
    if(alpha <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    const wingOpen = Math.abs(Math.sin(this.wingPhase));
    // 左翅
    ctx.beginPath();
    ctx.ellipse(-this.size * wingOpen, 0, this.size * wingOpen, this.size * 0.6, -0.3, 0, Math.PI*2);
    ctx.fillStyle = this.color + (alpha * 0.7) + ')';
    ctx.fill();
    // 右翅
    ctx.beginPath();
    ctx.ellipse(this.size * wingOpen, 0, this.size * wingOpen, this.size * 0.6, 0.3, 0, Math.PI*2);
    ctx.fill();
    // 身體
    ctx.beginPath();
    ctx.ellipse(0, 0, 1.5, this.size * 0.4, 0, 0, Math.PI*2);
    ctx.fillStyle = this.color + (alpha * 0.9) + ')';
    ctx.fill();
    ctx.restore();
  }
}

// ── 花瓣（春）────────────────────────
class Petal {
  constructor(){
    this.reset(true);
  }
  reset(init=false){
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : -10;
    this.vx = -0.5 + Math.random() * 1.0; // 微側風
    this.vy = 0.8 + Math.random() * 1.2;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random()-0.5) * 0.04;
    this.w = 6 + Math.random() * 6;
    this.h = this.w * 0.55;
    this.r = Math.floor(225 + Math.random()*20);
    this.g = Math.floor(150 + Math.random()*50);
    this.b = Math.floor(170 + Math.random()*40);
    this.opacity = 0;
    this.fadeIn = 0.008 + Math.random()*0.006;
    // 飄動：輕微正弦擺動
    this.swayAmp = 8 + Math.random()*12;
    this.swayFreq = 0.02 + Math.random()*0.02;
    this.t = Math.random()*1000;
  }
  update(){
    this.t++;
    this.x += this.vx + Math.sin(this.t * this.swayFreq) * 0.4;
    this.y += this.vy;
    this.rot += this.rotSpeed;
    this.opacity = Math.min(1, this.opacity + this.fadeIn);
    if(this.y > canvas.height + 15) this.reset();
  }
  draw(){
    const alpha = this.opacity * seasonAlpha;
    if(alpha<=0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.w/2, this.h/2, 0, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${alpha*0.75})`;
    ctx.fill();
    ctx.restore();
  }
}

// ── 螢火蟲（夏）──────────────────────
class Firefly {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = canvas.height * 0.3 + Math.random() * canvas.height * 0.55;
    this.vx = 0; this.vy = 0;
    this.targetX = this.x; this.targetY = this.y;
    this.size = 2 + Math.random() * 3;
    this.glowPhase = Math.random() * Math.PI * 2;
    this.glowSpeed = 0.02 + Math.random() * 0.03;
    this.changeTimer = 0;
    this.changeInterval = 80 + Math.floor(Math.random()*120);
    this.opacity = Math.random();
    this.r = 200 + Math.floor(Math.random()*55);
    this.g = 210 + Math.floor(Math.random()*45);
    this.b = 80 + Math.floor(Math.random()*80);
  }
  update(){
    this.glowPhase += this.glowSpeed;
    this.changeTimer++;
    if(this.changeTimer >= this.changeInterval){
      this.changeTimer = 0;
      this.changeInterval = 80 + Math.floor(Math.random()*120);
      // 隨機選新目標（原地附近飄移）
      const range = 60 + Math.random()*80;
      const angle = Math.random() * Math.PI * 2;
      this.targetX = Math.max(20, Math.min(canvas.width-20, this.x + Math.cos(angle)*range));
      this.targetY = Math.max(canvas.height*0.2, Math.min(canvas.height*0.9, this.y + Math.sin(angle)*range*0.5));
    }
    // 緩慢飄向目標
    this.vx += (this.targetX - this.x) * 0.008;
    this.vy += (this.targetY - this.y) * 0.008;
    this.vx *= 0.94;
    this.vy *= 0.94;
    this.x += this.vx;
    this.y += this.vy;
  }
  draw(){
    const glow = 0.5 + 0.5 * Math.sin(this.glowPhase);
    const alpha = glow * seasonAlpha;
    if(alpha<=0) return;
    ctx.save();
    // 外光暈
    const grad = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*5);
    grad.addColorStop(0, `rgba(${this.r},${this.g},${this.b},${alpha*0.6})`);
    grad.addColorStop(1, `rgba(${this.r},${this.g},${this.b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size*5, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    // 核心亮點
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,220,${alpha*0.9})`;
    ctx.fill();
    ctx.restore();
  }
}

// ── 落葉（秋）────────────────────────
class FallingLeaf {
  constructor(){
    this.reset(true);
  }
  reset(init=false){
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : -15;
    // 斜角：微向左或右
    this.vx = -1.2 + Math.random() * 2.4;
    this.vy = 1.0 + Math.random() * 1.8;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random()-0.5) * 0.08; // 大幅旋轉
    this.size = 7 + Math.random() * 9;
    this.r = Math.floor(160+Math.random()*80);
    this.g = Math.floor(100+Math.random()*80);
    this.b = Math.floor(10+Math.random()*50);
    this.opacity = 0;
    this.fadeIn = 0.006 + Math.random()*0.006;
    // 空氣阻力搖擺
    this.swayAmp = 15 + Math.random()*20;
    this.swayFreq = 0.015 + Math.random()*0.015;
    this.t = Math.random()*1000;
  }
  update(){
    this.t++;
    this.x += this.vx + Math.sin(this.t*this.swayFreq)*0.6;
    this.y += this.vy;
    this.rot += this.rotSpeed;
    this.opacity = Math.min(1, this.opacity + this.fadeIn);
    if(this.y > canvas.height+20) this.reset();
  }
  draw(){
    const alpha = this.opacity * seasonAlpha;
    if(alpha<=0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    // 葉形：斜橢圓
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size*0.45, this.size*0.28, 0.5, 0, Math.PI*2);
    ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${alpha*0.8})`;
    ctx.fill();
    // 葉脈
    ctx.beginPath();
    ctx.moveTo(-this.size*0.4, 0);
    ctx.lineTo(this.size*0.4, 0);
    ctx.strokeStyle=`rgba(${this.r-30},${this.g-30},${this.b},${alpha*0.4})`;
    ctx.lineWidth=0.5;
    ctx.stroke();
    ctx.restore();
  }
}

// ── 雪（冬）──────────────────────────
class Snowflake {
  constructor(){
    this.reset(true);
  }
  reset(init=false){
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : -8;
    // 微斜角，幾乎垂直
    this.vx = -0.3 + Math.random() * 0.6;
    this.vy = 0.4 + Math.random() * 0.8;
    this.size = 1.5 + Math.random() * 3;
    this.opacity = 0;
    this.fadeIn = 0.004 + Math.random()*0.004;
    // 極輕微搖擺
    this.swayAmp = 3 + Math.random()*5;
    this.swayFreq = 0.008 + Math.random()*0.01;
    this.t = Math.random()*1000;
    this.brightness = 210 + Math.floor(Math.random()*45);
  }
  update(){
    this.t++;
    this.x += this.vx + Math.sin(this.t*this.swayFreq)*0.2;
    this.y += this.vy;
    this.opacity = Math.min(1, this.opacity+this.fadeIn);
    if(this.y > canvas.height+10) this.reset();
  }
  draw(){
    const alpha = this.opacity * seasonAlpha;
    if(alpha<=0) return;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle=`rgba(${this.brightness},${this.brightness},${this.brightness+15},${alpha*0.55})`;
    ctx.fill();
  }
}

// ── 粒子工廠 ─────────────────────────
const SEASON_COUNTS = {
  spring: { Butterfly:6, Petal:14 },
  summer: { Firefly:22 },
  autumn: { FallingLeaf:16 },
  winter: { Snowflake:28 },
};
const CLASS_MAP = { Butterfly, Petal, Firefly, FallingLeaf, Snowflake };

function buildParticles(season){
  particles = [];
  const cfg = SEASON_COUNTS[season] || {};
  Object.entries(cfg).forEach(([cls, count])=>{
    for(let i=0;i<count;i++){
      particles.push(new CLASS_MAP[cls]());
    }
  });
}

// ── 季節切換 ─────────────────────────
let seasonFading = false;
function changeSeason(newSeason){
  if(newSeason === activeSeason) return;
  activeSeason = newSeason;
  updateDots();
  // 淡出 → 重建 → 淡入
  seasonFading = true;
  let fadeOut = setInterval(()=>{
    seasonAlpha -= 0.04;
    if(seasonAlpha <= 0){
      seasonAlpha = 0;
      clearInterval(fadeOut);
      buildParticles(newSeason);
      let fadeIn = setInterval(()=>{
        seasonAlpha += 0.03;
        if(seasonAlpha >= 1){ seasonAlpha=1; clearInterval(fadeIn); seasonFading=false; }
      }, 30);
    }
  }, 30);
}

const SEASON_ORDER = ['spring','summer','autumn','winter'];
function updateDots(){
  const idx = SEASON_ORDER.indexOf(activeSeason);
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

// ═══════════════════════════════════════
// 全景橫移
// ═══════════════════════════════════════
const TOTAL_DURATION = 160000;
let startTime=null, paused=false, pauseAccum=0, pauseAt=null;
let currentDetectedSeason = 'spring';

function getPanelWidths(){
  const panels = panorama.querySelectorAll('.panel');
  return Array.from(panels).slice(0,IMAGES.length).map(p=>p.offsetWidth||window.innerWidth);
}

function detectSeason(scrollX, widths){
  let accum=0;
  for(let i=0;i<IMAGES.length;i++){
    const w=widths[i];
    if(scrollX>=accum && scrollX<accum+w){
      const progress=(scrollX-accum)/w;
      const item=IMAGES[i];
      const season = (item.next && progress>0.5) ? item.next : item.season;
      if(season!==currentDetectedSeason){
        currentDetectedSeason=season;
        changeSeason(season);
      }
      return;
    }
    accum+=w;
  }
}

// ═══════════════════════════════════════
// 主 loop
// ═══════════════════════════════════════
function loop(ts){
  if(!startTime) startTime=ts;

  // 清畫布
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 橫移
  if(!paused){
    const widths=getPanelWidths();
    const singleW=widths.reduce((a,b)=>a+b,0);
    if(singleW>0){
      const elapsed=(ts-startTime)-pauseAccum;
      const progress=(elapsed%TOTAL_DURATION)/TOTAL_DURATION;
      const x=-(progress*singleW);
      panorama.style.transform=`translateX(${x}px)`;
      detectSeason(Math.abs(x),widths);
    }
  }

  // 粒子
  particles.forEach(p=>{ p.update(); p.draw(); });

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════
// 暫停
// ═══════════════════════════════════════
function togglePause(){
  if(!paused){
    paused=true; pauseAt=performance.now();
    document.getElementById('pause-hint').textContent='點擊繼續';
  } else {
    paused=false; pauseAccum+=performance.now()-pauseAt;
    document.getElementById('pause-hint').textContent='點擊暫停';
  }
}
document.addEventListener('click', togglePause);
document.addEventListener('touchstart', e=>{ e.preventDefault(); togglePause(); },{passive:false});

// ═══════════════════════════════════════
// 游標
// ═══════════════════════════════════════
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove', e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

// ═══════════════════════════════════════
// 啟動
// ═══════════════════════════════════════
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('brand').querySelector('img').style.opacity='0.4';
    document.getElementById('guide').style.opacity='1';
    document.getElementById('season-dots').style.opacity='1';
    document.getElementById('pause-hint').style.opacity='1';
  },1500);
  buildParticles('spring');
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
