<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心映好事 — 靜心空間</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1520;
    font-family: 'Georgia', serif;
    cursor: none;
  }

  #scene {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* 四季橫向長圖容器 */
  #panorama {
    position: absolute;
    top: 0; left: 0;
    width: 400%; /* 4張圖並排 */
    height: 100%;
    display: flex;
    animation: slowScroll 120s linear infinite;
  }

  @keyframes slowScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); } /* 滾到一半(2張)再循環 */
  }

  .season {
    position: relative;
    width: 25%; /* 每張佔總寬1/4 */
    height: 100%;
    flex-shrink: 0;
  }

  .season img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* 季節間漸變過渡 */
  .season::after {
    content: '';
    position: absolute;
    top: 0; right: -60px;
    width: 120px; height: 100%;
    background: inherit;
    filter: blur(20px);
    z-index: 1;
    pointer-events: none;
  }

  /* 全域暗角 */
  #vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 40%,
      rgba(15,10,20,0.4) 75%,
      rgba(10,8,15,0.8) 100%
    );
    pointer-events: none;
    z-index: 10;
  }

  /* 上下遮罩讓邊緣更柔 */
  #edge-mask {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(15,10,20,0.5) 0%, transparent 12%, transparent 88%, rgba(15,10,20,0.5) 100%);
    pointer-events: none;
    z-index: 11;
  }

  /* 粒子層 */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatParticle linear infinite;
    opacity: 0;
  }

  @keyframes floatParticle {
    0%   { transform: translateY(110vh) translateX(0px) rotate(0deg); opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.7; }
    100% { transform: translateY(-10vh) translateX(40px) rotate(720deg); opacity: 0; }
  }

  /* 品牌文字 */
  #brand {
    position: fixed;
    top: 28px;
    right: 32px;
    z-index: 50;
    text-align: right;
    pointer-events: none;
  }

  #brand-name {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,240,250,0.45);
    font-weight: normal;
  }

  /* 中央引導文字 */
  #guide {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    text-align: center;
    pointer-events: none;
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.35; transform: translateX(-50%) translateY(0); }
    50%       { opacity: 0.65; transform: translateX(-50%) translateY(-4px); }
  }

  #guide-text {
    font-size: 12px;
    letter-spacing: 5px;
    color: rgba(255,240,250,0.6);
    white-space: nowrap;
  }

  /* 季節標示 */
  #season-indicator {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    gap: 10px;
    pointer-events: none;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,240,250,0.25);
    transition: background 1s ease;
  }
  .dot.active {
    background: rgba(255,240,250,0.65);
  }

  /* 呼吸圈 */
  #breath-ring {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1px; height: 1px;
    z-index: 5;
    pointer-events: none;
  }

  #breath-ring::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 0.5px solid rgba(255,240,255,0.12);
    animation: ring 5s ease-in-out infinite;
  }

  @keyframes ring {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.12; }
    50%       { transform: translate(-50%, -50%) scale(1.3); opacity: 0.06; }
  }

  /* 自定游標 */
  #cursor {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,240,255,0.4);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
  }
</style>
</head>
<body>

<div id="scene">
  <div id="panorama">
    <!-- 春夏秋冬 × 2 (無縫循環需要複製一份) -->
    <div class="season" data-season="spring">
      <img src="images/spring.jpg" alt="春">
    </div>
    <div class="season" data-season="summer">
      <img src="images/summer.jpg" alt="夏">
    </div>
    <div class="season" data-season="autumn">
      <img src="images/autumn.jpg" alt="秋">
    </div>
    <div class="season" data-season="winter">
      <img src="images/winter.jpg" alt="冬">
    </div>
    <!-- 複製一份做無縫循環 -->
    <div class="season" data-season="spring">
      <img src="images/spring.jpg" alt="春">
    </div>
    <div class="season" data-season="summer">
      <img src="images/summer.jpg" alt="夏">
    </div>
    <div class="season" data-season="autumn">
      <img src="images/autumn.jpg" alt="秋">
    </div>
    <div class="season" data-season="winter">
      <img src="images/winter.jpg" alt="冬">
    </div>
  </div>
</div>

<div id="vignette"></div>
<div id="edge-mask"></div>
<div id="particles"></div>
<div id="breath-ring"></div>

<div id="brand">
  <div id="brand-name">心映好事</div>
</div>

<div id="season-indicator">
  <div class="dot active" id="dot-0"></div>
  <div class="dot" id="dot-1"></div>
  <div class="dot" id="dot-2"></div>
  <div class="dot" id="dot-3"></div>
</div>

<div id="guide">
  <div id="guide-text">讓自己慢下來，再抽一張牌</div>
</div>

<div id="cursor"></div>

<script>
// 游標
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// 季節切換偵測 & 粒子配置
const seasonConfig = {
  spring: {
    particles: { color: ['rgba(255,190,220,0.8)','rgba(255,215,235,0.7)','rgba(240,180,210,0.75)'], size: [5,8], count: 12, shape: 'petal' },
    guideText: '讓自己慢下來，再抽一張牌'
  },
  summer: {
    particles: { color: ['rgba(255,248,180,0.9)','rgba(200,240,180,0.7)','rgba(255,255,200,0.8)'], size: [3,5], count: 15, shape: 'glow' },
    guideText: '讓自己慢下來，再抽一張牌'
  },
  autumn: {
    particles: { color: ['rgba(200,140,60,0.8)','rgba(180,100,50,0.7)','rgba(220,160,80,0.75)'], size: [6,10], count: 10, shape: 'leaf' },
    guideText: '讓自己慢下來，再抽一張牌'
  },
  winter: {
    particles: { color: ['rgba(220,235,255,0.7)','rgba(240,245,255,0.6)','rgba(255,255,255,0.5)'], size: [2,5], count: 20, shape: 'snow' },
    guideText: '讓自己慢下來，再抽一張牌'
  }
};

const seasons = ['spring','summer','autumn','winter'];
let currentSeason = 0;
const particleContainer = document.getElementById('particles');
const guideTextEl = document.getElementById('guide-text');
let particleEls = [];

function createParticles(season) {
  particleEls.forEach(p => p.remove());
  particleEls = [];
  const cfg = seasonConfig[season].particles;
  for (let i = 0; i < cfg.count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const color = cfg.color[Math.floor(Math.random() * cfg.color.length)];
    const size = cfg.size[0] + Math.random() * (cfg.size[1] - cfg.size[0]);
    const left = Math.random() * 100;
    const dur = 8 + Math.random() * 10;
    const delay = Math.random() * dur;
    p.style.cssText = `
      left: ${left}%;
      bottom: -20px;
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      animation-duration: ${dur}s;
      animation-delay: -${delay}s;
      border-radius: ${cfg.shape === 'snow' ? '50%' : cfg.shape === 'leaf' ? '50% 0 50% 0' : '50% 50% 50% 50% / 60% 60% 40% 40%'};
    `;
    particleContainer.appendChild(p);
    particleEls.push(p);
  }
}

// 每隔 30 秒切換季節指示點（配合 120 秒全程 ÷ 4 季）
createParticles(seasons[0]);
let dotInterval = setInterval(() => {
  document.getElementById('dot-' + currentSeason).classList.remove('active');
  currentSeason = (currentSeason + 1) % 4;
  document.getElementById('dot-' + currentSeason).classList.add('active');
  createParticles(seasons[currentSeason]);
}, 30000);

// 點擊暫停/繼續
let paused = false;
const panorama = document.getElementById('panorama');
document.addEventListener('click', () => {
  paused = !paused;
  panorama.style.animationPlayState = paused ? 'paused' : 'running';
});

// 觸控支援（手機）
document.addEventListener('touchstart', () => {
  paused = !paused;
  panorama.style.animationPlayState = paused ? 'paused' : 'running';
});
</script>
</body>
</html>
