<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>心映好事 — 靜心空間</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#0d0a12; cursor:none; }
#scene { position:fixed; inset:0; overflow:hidden; }
#panorama { position:absolute; top:0; left:0; height:100%; display:flex; will-change:transform; }
.panel { position:relative; height:100%; flex-shrink:0; }
.panel img { height:100%; width:auto; display:block; }
#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:10;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(8,5,15,0.35) 70%,rgba(5,3,10,0.75) 100%);
}
#edge-mask {
  position:fixed; inset:0; pointer-events:none; z-index:11;
  background:linear-gradient(180deg,rgba(8,5,15,0.6) 0%,transparent 10%,transparent 90%,rgba(8,5,15,0.6) 100%);
}
#canvas { position:fixed; inset:0; pointer-events:none; z-index:20; }

/* SVG 蝴蝶容器 */
#svg-layer { position:fixed; inset:0; pointer-events:none; z-index:21; overflow:hidden; }
.butterfly-wrap {
  position:absolute;
  transform-origin:center center;
}
/* 翅膀開合動畫 */
@keyframes wingFlap {
  0%,100% { transform:scaleX(1); }
  50%     { transform:scaleX(0.15); }
}

#brand { position:fixed; top:24px; right:28px; z-index:50; pointer-events:none; }
#brand img { width:72px; opacity:0; filter:brightness(0) invert(1); transition:opacity 2s ease; }
#guide { position:fixed; bottom:36px; left:50%; transform:translateX(-50%); z-index:50; pointer-events:none; text-align:center; opacity:0; transition:opacity 2s ease; }
#guide-text {
  font-family:'Georgia','宋體',serif; font-size:12px; letter-spacing:5px;
  color:rgba(255,245,250,0.55); white-space:nowrap;
  animation:breathe 5s ease-in-out infinite;
}
@keyframes breathe {
  0%,100%{opacity:0.4;transform:translateY(0);}
  50%{opacity:0.7;transform:translateY(-3px);}
}
#season-dots {
  position:fixed; bottom:68px; left:50%; transform:translateX(-50%);
  z-index:50; display:flex; gap:8px; pointer-events:none;
  opacity:0; transition:opacity 2s ease;
}
.dot { width:3px; height:3px; border-radius:50%; background:rgba(255,245,250,0.2); transition:background 1.5s ease,transform 1.5s ease; }
.dot.active { background:rgba(255,245,250,0.6); transform:scale(1.4); }
#pause-hint {
  position:fixed; top:24px; left:28px; z-index:50;
  font-family:'Georgia',serif; font-size:10px; letter-spacing:3px;
  color:rgba(255,245,250,0.2); pointer-events:none;
  opacity:0; transition:opacity 2s ease;
}
#cursor { position:fixed; width:5px; height:5px; border-radius:50%; background:rgba(255,240,255,0.35); pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
</style>
</head>
<body>

<div id="scene"><div id="panorama"></div></div>
<div id="vignette"></div>
<div id="edge-mask"></div>
<canvas id="canvas"></canvas>
<div id="svg-layer"></div>

<div id="brand"><img src="images/logo.svg" alt="心映好事"></div>
<div id="season-dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
<div id="guide"><div id="guide-text">讓自己慢下來，再抽一張牌</div></div>
<div id="pause-hint">點擊暫停</div>
<div id="cursor"></div>

<script>
// ═══════════════════════════════════════
// 圖片清單
// ═══════════════════════════════════════
const IMAGES = [
  {file:'spring1.jpg',season:'spring'},
  {file:'spring2.jpg',season:'spring'},
  {file:'spring3.jpg',season:'spring'},
  {file:'spring4.jpg',season:'spring', next:'summer'},
  {file:'summer1.jpg',season:'summer'},
  {file:'summer2.jpg',season:'summer'},
  {file:'summer3.jpg',season:'summer'},
  {file:'summer4.jpg',season:'summer', next:'autumn'},
  {file:'autumn1.jpg',season:'autumn'},
  {file:'autumn2.jpg',season:'autumn'},
  {file:'autumn3.jpg',season:'autumn'},
  {file:'autumn4.jpg',season:'autumn', next:'winter'},
  {file:'winter1.jpg',season:'winter'},
  {file:'winter2.jpg',season:'winter'},
  {file:'winter3.jpg',season:'winter'},
  {file:'winter4.jpg',season:'winter', next:'spring'},
];

const FALLBACK = {
  spring:'linear-gradient(160deg,#e8d0e8,#f5e0f5,#dcc8e4)',
  summer:'linear-gradient(160deg,#1a1540,#2a2060,#151030)',
  autumn:'linear-gradient(160deg,#c89840,#d4b870,#b07820)',
  winter:'linear-gradient(160deg,#d8e8f4,#eaf4ff,#c8dcea)',
};

// ═══════════════════════════════════════
// 建立全景
// ═══════════════════════════════════════
const panorama = document.getElementById('panorama');
[...IMAGES,...IMAGES].forEach((item)=>{
  const panel = document.createElement('div');
  panel.className='panel';
  panel.dataset.season = item.season;
  if(item.next) panel.dataset.next = item.next;
  const img = new Image();
  img.src=`images/${item.file}`;
  img.alt=item.season;
  img.style.cssText='height:100%;width:auto;display:block;';
  img.onerror=()=>{ img.remove(); panel.style.cssText+=`width:${window.innerWidth}px;background:${FALLBACK[item.season]};`; };
  panel.appendChild(img);
  panorama.appendChild(panel);
});

// ═══════════════════════════════════════
// Canvas 粒子（花瓣、螢火蟲、雪）
// ═══════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let canvasParticles = [];
let seasonAlpha = 1;

// ── 花瓣 ──────────────────────────────
class Petal {
  constructor(){ this.reset(true); }
  reset(init=false){
    this.x=Math.random()*canvas.width;
    this.y=init?Math.random()*canvas.height:-10;
    this.vx=-0.5+Math.random()*1.0;
    this.vy=0.8+Math.random()*1.2;
    this.rot=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.04;
    this.w=6+Math.random()*6; this.h=this.w*0.55;
    this.r=225+rnd(20); this.g=150+rnd(50); this.b=170+rnd(40);
    this.opacity=0; this.fadeIn=0.008+rnd(0.006);
    this.swayFreq=0.02+rnd(0.02); this.t=rnd(1000);
  }
  update(){
    this.t++; this.x+=this.vx+Math.sin(this.t*this.swayFreq)*0.4; this.y+=this.vy;
    this.rot+=this.rotSpeed; this.opacity=Math.min(1,this.opacity+this.fadeIn);
    if(this.y>canvas.height+15) this.reset();
  }
  draw(){
    const a=this.opacity*seasonAlpha; if(a<=0)return;
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    ctx.beginPath(); ctx.ellipse(0,0,this.w/2,this.h/2,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${a*0.75})`; ctx.fill(); ctx.restore();
  }
}

// ── 螢火蟲 ────────────────────────────
class Firefly {
  constructor(){
    this.x=rnd(canvas.width); this.y=canvas.height*0.3+rnd(canvas.height*0.55);
    this.vx=0; this.vy=0; this.targetX=this.x; this.targetY=this.y;
    this.size=2+rnd(3); this.glowPhase=rnd(Math.PI*2); this.glowSpeed=0.02+rnd(0.03);
    this.changeTimer=0; this.changeInterval=80+Math.floor(rnd(120));
    this.r=200+Math.floor(rnd(55)); this.g=210+Math.floor(rnd(45)); this.b=80+Math.floor(rnd(80));
  }
  update(){
    this.glowPhase+=this.glowSpeed; this.changeTimer++;
    if(this.changeTimer>=this.changeInterval){
      this.changeTimer=0; this.changeInterval=80+Math.floor(rnd(120));
      const range=60+rnd(80); const angle=rnd(Math.PI*2);
      this.targetX=Math.max(20,Math.min(canvas.width-20,this.x+Math.cos(angle)*range));
      this.targetY=Math.max(canvas.height*0.2,Math.min(canvas.height*0.9,this.y+Math.sin(angle)*range*0.5));
    }
    this.vx+=(this.targetX-this.x)*0.008; this.vy+=(this.targetY-this.y)*0.008;
    this.vx*=0.94; this.vy*=0.94; this.x+=this.vx; this.y+=this.vy;
  }
  draw(){
    const glow=0.5+0.5*Math.sin(this.glowPhase); const a=glow*seasonAlpha; if(a<=0)return;
    ctx.save();
    const grad=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*5);
    grad.addColorStop(0,`rgba(${this.r},${this.g},${this.b},${a*0.6})`);
    grad.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*5,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,220,${a*0.9})`; ctx.fill(); ctx.restore();
  }
}

// ── 雪花 ──────────────────────────────
class Snowflake {
  constructor(){ this.reset(true); }
  reset(init=false){
    this.x=rnd(canvas.width); this.y=init?rnd(canvas.height):-8;
    this.vx=-0.3+rnd(0.6); this.vy=0.4+rnd(0.8);
    this.size=1.5+rnd(3); this.opacity=0; this.fadeIn=0.004+rnd(0.004);
    this.swayFreq=0.008+rnd(0.01); this.t=rnd(1000);
    this.brightness=210+Math.floor(rnd(45));
  }
  update(){
    this.t++; this.x+=this.vx+Math.sin(this.t*this.swayFreq)*0.2; this.y+=this.vy;
    this.opacity=Math.min(1,this.opacity+this.fadeIn);
    if(this.y>canvas.height+10) this.reset();
  }
  draw(){
    const a=this.opacity*seasonAlpha; if(a<=0)return;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.brightness},${this.brightness},${this.brightness+15},${a*0.55})`; ctx.fill();
  }
}

function rnd(n){ return Math.random()*n; }

// ═══════════════════════════════════════
// SVG 蝴蝶系統（DOM-based）
// ═══════════════════════════════════════
const svgLayer = document.getElementById('svg-layer');
let butterflyInstances = [];
let svgReady = false;

// 預載 SVG
const svgCache = {};
function loadSVG(name, src){
  return fetch(src)
    .then(r => r.text())
    .then(text => { svgCache[name] = text; })
    .catch(() => { svgCache[name] = null; });
}

// 蝴蝶物理狀態
class ButterflyDOM {
  constructor(svgName){
    this.svgName = svgName;
    this.size = 28 + rnd(18); // px 顯示大小
    // 低空飛行：畫面下方 55%~92% 高度
    this.x = rnd(window.innerWidth);
    this.y = window.innerHeight * (0.55 + rnd(0.37));
    // 主要左右移動
    this.vx = (Math.random()>0.5?1:-1) * (0.4 + rnd(0.6));
    this.vy = 0; // 垂直速度
    // 上下微幅震盪
    this.swayAmp = 8 + rnd(12);
    this.swayFreq = 0.008 + rnd(0.008);
    this.t = rnd(1000);
    this.baseY = this.y;
    // 翅膀
    this.wingSpeed = 1.5 + rnd(1.5); // animation duration (s)
    this.opacity = 0;
    this.fadeIn = 0.005 + rnd(0.005);
    this.el = null;
    this.alive = true;
    this._build();
  }
  _build(){
    const svg = svgCache[this.svgName];
    if(!svg) return;
    const wrap = document.createElement('div');
    wrap.className = 'butterfly-wrap';
    wrap.style.cssText = `
      position:absolute;
      width:${this.size*2}px;
      height:${this.size*2}px;
      left:${this.x - this.size}px;
      top:${this.y - this.size}px;
      opacity:0;
      transform-origin:center center;
    `;
    // 插入 SVG，縮放到容器大小
    const svgEl = document.createElement('div');
    svgEl.innerHTML = svg;
    const svgNode = svgEl.querySelector('svg');
    if(svgNode){
      svgNode.style.cssText = `width:100%;height:100%;`;
      // 翅膀開合：對整個 SVG 做 scaleX
      svgNode.style.animation = `wingFlap ${this.wingSpeed}s ease-in-out infinite`;
      svgNode.style.transformOrigin = 'center center';
    }
    wrap.appendChild(svgNode || svgEl);
    svgLayer.appendChild(wrap);
    this.el = wrap;
  }
  update(){
    if(!this.el) return;
    this.t++;
    // 左右移動
    this.x += this.vx;
    // 上下微幅震盪
    this.y = this.baseY + Math.sin(this.t * this.swayFreq) * this.swayAmp;
    // 邊界：左右穿越
    if(this.x < -this.size*3) this.x = window.innerWidth + this.size;
    if(this.x > window.innerWidth + this.size*3) this.x = -this.size;
    // 淡入
    this.opacity = Math.min(1, this.opacity + this.fadeIn);
    // 更新 DOM
    const alpha = this.opacity * seasonAlpha;
    this.el.style.left = (this.x - this.size) + 'px';
    this.el.style.top  = (this.y - this.size) + 'px';
    this.el.style.opacity = alpha;
    // 朝向：vx < 0 翻轉
    this.el.style.transform = this.vx < 0 ? 'scaleX(-1)' : 'scaleX(1)';
  }
  destroy(){
    if(this.el) this.el.remove();
    this.alive = false;
  }
}

function buildButterflies(){
  butterflyInstances.forEach(b => b.destroy());
  butterflyInstances = [];
  if(!svgCache['butterfly1'] && !svgCache['butterfly2']) return;
  const count = 5;
  for(let i=0;i<count;i++){
    const name = (i%2===0 && svgCache['butterfly1']) ? 'butterfly1' : 
                 (svgCache['butterfly2'] ? 'butterfly2' : 'butterfly1');
    if(svgCache[name]) butterflyInstances.push(new ButterflyDOM(name));
  }
}

function clearButterflies(){
  butterflyInstances.forEach(b => {
    if(b.el){ b.el.style.transition='opacity 1.5s ease'; b.el.style.opacity='0'; }
    setTimeout(()=>b.destroy(), 1600);
  });
  butterflyInstances = [];
}

// ═══════════════════════════════════════
// SVG 銀杏葉系統（Canvas-based，用 Path2D）
// ═══════════════════════════════════════
let ginkgoPath = null;

function buildGinkgoPath(){
  if(!svgCache['ginkgo']) return;
  // 從 SVG 提取 path d
  const match = svgCache['ginkgo'].match(/d="([^"]+)"/);
  if(!match) return;
  try { ginkgoPath = new Path2D(match[1]); } catch(e){}
}

class GinkgoLeaf {
  constructor(){ this.reset(true); }
  reset(init=false){
    this.x = rnd(canvas.width);
    this.y = init ? rnd(canvas.height) : -15;
    // 斜角飄落
    this.vx = -1.2 + rnd(2.4);
    this.vy = 0.9 + rnd(1.6);
    this.rot = rnd(Math.PI*2);
    this.rotSpeed = (Math.random()-0.5) * 0.07;
    // SVG viewBox 是 1080×1080，縮小到 20-35px
    this.scale = (0.018 + rnd(0.014));
    this.opacity = 0; this.fadeIn = 0.006+rnd(0.006);
    this.swayFreq = 0.015+rnd(0.015); this.t = rnd(1000);
    // 色調微變：原色 #f5c74f 基礎上做微調
    this.hue = 42 + rnd(12); // 橘黃系
    this.sat = 85 + rnd(10);
    this.lit = 60 + rnd(10);
  }
  update(){
    this.t++; this.x+=this.vx+Math.sin(this.t*this.swayFreq)*0.5; this.y+=this.vy;
    this.rot+=this.rotSpeed; this.opacity=Math.min(1,this.opacity+this.fadeIn);
    if(this.y>canvas.height+20) this.reset();
  }
  draw(){
    const a = this.opacity * seasonAlpha; if(a<=0||!ginkgoPath) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    // 縮放（SVG 原始是 1080×1080，中心在 540,540）
    ctx.scale(this.scale, this.scale);
    ctx.translate(-540, -540);
    ctx.fillStyle = `hsla(${this.hue},${this.sat}%,${this.lit}%,${a*0.85})`;
    ctx.fill(ginkgoPath);
    ctx.restore();
  }
}

// ═══════════════════════════════════════
// 季節粒子配置
// ═══════════════════════════════════════
const SEASON_CFG = {
  spring:  { canvas:[{cls:Petal,count:14}],      svgButterly:true },
  summer:  { canvas:[{cls:Firefly,count:22}],    svgButterly:false },
  autumn:  { canvas:[{cls:GinkgoLeaf,count:16}], svgButterly:false },
  winter:  { canvas:[{cls:Snowflake,count:28}],  svgButterly:false },
};

let activeSeason = 'spring';

function buildCanvasParticles(season){
  canvasParticles = [];
  const cfg = SEASON_CFG[season];
  if(!cfg) return;
  cfg.canvas.forEach(({cls,count})=>{
    for(let i=0;i<count;i++) canvasParticles.push(new cls());
  });
}

function changeSeason(newSeason){
  if(newSeason === activeSeason) return;
  activeSeason = newSeason;
  updateDots();
  // 淡出
  let fadeOut = setInterval(()=>{
    seasonAlpha = Math.max(0, seasonAlpha-0.05);
    if(seasonAlpha<=0){
      clearInterval(fadeOut);
      // 清蝴蝶
      clearButterflies();
      // 重建 canvas 粒子
      buildCanvasParticles(newSeason);
      // 春天加蝴蝶
      if(newSeason==='spring' && svgReady) buildButterflies();
      // 淡入
      let fadeIn = setInterval(()=>{
        seasonAlpha = Math.min(1, seasonAlpha+0.04);
        if(seasonAlpha>=1) clearInterval(fadeIn);
      },30);
    }
  },30);
}

const SEASON_ORDER=['spring','summer','autumn','winter'];
function updateDots(){
  const idx=SEASON_ORDER.indexOf(activeSeason);
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

// ═══════════════════════════════════════
// 主 loop
// ═══════════════════════════════════════
const TOTAL_DURATION = 160000;
let startTime=null, paused=false, pauseAccum=0, pauseAt=null;
let currentDetectedSeason='spring';

function getPanelWidths(){
  return Array.from(panorama.querySelectorAll('.panel')).slice(0,IMAGES.length).map(p=>p.offsetWidth||window.innerWidth);
}

function detectSeason(scrollX, widths){
  let accum=0;
  for(let i=0;i<IMAGES.length;i++){
    const w=widths[i];
    if(scrollX>=accum && scrollX<accum+w){
      const progress=(scrollX-accum)/w;
      const item=IMAGES[i];
      const season=(item.next && progress>0.5)?item.next:item.season;
      if(season!==currentDetectedSeason){ currentDetectedSeason=season; changeSeason(season); }
      return;
    }
    accum+=w;
  }
}

function loop(ts){
  if(!startTime) startTime=ts;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!paused){
    const widths=getPanelWidths();
    const singleW=widths.reduce((a,b)=>a+b,0);
    if(singleW>0){
      const elapsed=(ts-startTime)-pauseAccum;
      const progress=(elapsed%TOTAL_DURATION)/TOTAL_DURATION;
      const x=-(progress*singleW);
      panorama.style.transform=`translateX(${x}px)`;
      detectSeason(Math.abs(x),widths);
    }
  }

  // Canvas 粒子
  canvasParticles.forEach(p=>{ p.update(); p.draw(); });
  // SVG 蝴蝶更新
  butterflyInstances.forEach(b=>b.update());

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════
// 暫停
// ═══════════════════════════════════════
function togglePause(){
  if(!paused){ paused=true; pauseAt=performance.now(); document.getElementById('pause-hint').textContent='點擊繼續'; }
  else { paused=false; pauseAccum+=performance.now()-pauseAt; document.getElementById('pause-hint').textContent='點擊暫停'; }
}
document.addEventListener('click', togglePause);
document.addEventListener('touchstart', e=>{ e.preventDefault(); togglePause(); },{passive:false});

// ═══════════════════════════════════════
// 游標
// ═══════════════════════════════════════
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove', e=>{ cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });

// ═══════════════════════════════════════
// 啟動
// ═══════════════════════════════════════
window.addEventListener('load', async ()=>{
  // 載入 SVG 素材
  await Promise.all([
    loadSVG('butterfly1','images/butterfly1.svg'),
    loadSVG('butterfly2','images/butterfly2.svg'),
    loadSVG('ginkgo','images/ginkgo.svg'),
  ]);
  svgReady = true;
  buildGinkgoPath();

  // UI 淡入
  setTimeout(()=>{
    document.getElementById('brand').querySelector('img').style.opacity='0.4';
    document.getElementById('guide').style.opacity='1';
    document.getElementById('season-dots').style.opacity='1';
    document.getElementById('pause-hint').style.opacity='1';
  },1500);

  // 初始粒子（春天）
  buildCanvasParticles('spring');
  buildButterflies();

  requestAnimationFrame(loop);
});
</script>
</body>
</html>
