<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>擁抱情緒牌卡 — 冥想影片</title>
<link rel="icon" type="image/svg+xml" href="images/logo_icon.svg">
<meta name="version" content="v5.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#0d0a12; cursor:none; }

/* 縮放容器：固定 1920x1080 設計尺寸，CSS scale 填滿螢幕 */
#scene-wrap {
  position:fixed;
  width:1920px;
  height:1080px;
  top:50%; left:50%;
  transform-origin:center center;
  /* JS 會動態設定 transform:translate(-50%,-50%) scale(N) */
}
#scene {
  position:absolute; inset:0; overflow:hidden;
}
#panorama {
  position:absolute; top:0; left:0;
  height:1080px;
  will-change:transform;
  transform-origin:top left;
}
.panel {
  position:absolute; top:0;
  height:1080px; overflow:hidden;
}
.panel img {
  width:100%; height:1080px;
  object-fit:cover; display:block;
  pointer-events:none;
  -webkit-user-drag:none;
  user-drag:none;
}
#vignette { display:none; }
#edge-mask {
  position:fixed; inset:0; pointer-events:none; z-index:11;
  background:linear-gradient(180deg, transparent 0%, transparent 92%, rgba(8,5,15,0.3) 100%);
}
#canvas { position:fixed; inset:0; pointer-events:none; z-index:20; }

/* SVG 蝴蝶層 */
#svg-layer { position:fixed; inset:0; pointer-events:none; z-index:21; overflow:hidden; }

/* 蝴蝶容器 */
.butterfly-wrap { position:absolute; transform-origin:center center; }

/* 上下飄動 */
@keyframes bfFlutter {
  0%,25%,50%,75%,100% { transform:translate3d(0,0,0); }
  10%,60%             { transform:translate3d(0,12px,0); }
  30%,80%             { transform:translate3d(0,4px,0); }
}
/* 左翅 3D 開合 */
@keyframes bfLeftWing {
  0%,100% { transform:rotate3d(0,1,0,60deg); }
  50%     { transform:rotate3d(0,1,0,-70deg); }
}
/* 右翅 3D 開合 */
@keyframes bfRightWing {
  0%,100% { transform:scaleX(-1) rotate3d(0,1,0,60deg); }
  50%     { transform:scaleX(-1) rotate3d(0,1,0,-70deg); }
}
.bf-body {
  position:absolute; width:100%; height:100%;
  transform-style:preserve-3d;
  animation:bfFlutter 8s ease-in-out infinite;
}
.bf-wing {
  position:absolute; top:0; width:50%; height:100%;
  transform-style:preserve-3d;
}
.bf-wing svg { width:100%; height:100%; display:block; }
.bf-wing.left {
  left:0; transform-origin:100% 50%;
  animation:bfLeftWing 0.5s ease-in-out infinite;
}
.bf-wing.right {
  right:0; transform-origin:0% 50%;
  animation:bfRightWing 0.5s ease-in-out infinite;
}

/* 品牌 logo */
#brand { position:fixed; top:20px; right:20px; z-index:50; pointer-events:none; }
#brand img { width:64px; opacity:0; filter:brightness(0) invert(1); transition:opacity 2s ease; }

/* 底部引導文字 — 拿掉 */
#guide { display:none; }

/* 四季切換點點（可點擊） */
#season-dots {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  z-index:100; display:flex; gap:18px; align-items:center;
  opacity:0; transition:opacity 2s ease;
  pointer-events:auto;
}
.season-dot {
  width:12px; height:12px; border-radius:50%;
  background:rgba(255,245,250,0.3);
  cursor:pointer;
  pointer-events:auto;
  transition:background 0.4s ease, transform 0.3s ease;
  -webkit-tap-highlight-color:transparent;
}
.season-dot:hover { background:rgba(255,245,250,0.7); transform:scale(1.3); }
.season-dot.active { background:rgba(255,245,250,0.9); transform:scale(1.4); }

/* 右下角控制按鈕 */
#control-btn, #music-btn {
  position:fixed; bottom:28px; z-index:100;
  width:36px; height:36px;
  color:rgba(255,245,250,0.4); cursor:pointer;
  pointer-events:auto;
  transition:color 0.3s ease, transform 0.2s ease;
  -webkit-tap-highlight-color:transparent;
}
#control-btn { right:68px; }
#music-btn   { right:20px; }
#control-btn:hover, #music-btn:hover {
  color:rgba(255,245,250,0.8); transform:scale(1.1);
}

#cursor {
  position:fixed; width:5px; height:5px; border-radius:50%;
  background:rgba(255,240,255,0.35); pointer-events:none;
  z-index:9999; transform:translate(-50%,-50%);
}
#pause-hint { display:none; }

/* 蝴蝶容器：上下飄動 */
.butterfly-wrap {
  position:absolute;
  width:40px; height:40px;
  transform-origin:center center;
}

/* 上下飄動軌跡 */
@keyframes bfFlutter {
  0%,25%,50%,75%,100% { transform:translate3d(0,0,0); }
  10%,60%             { transform:translate3d(0,12px,0); }
  30%,80%             { transform:translate3d(0,4px,0); }
}

/* 左翅 3D 開合 */
@keyframes bfLeftWing {
  0%,100% { transform:rotate3d(0,1,0,60deg); }
  50%     { transform:rotate3d(0,1,0,-70deg); }
}

/* 右翅 3D 開合（鏡像） */
@keyframes bfRightWing {
  0%,100% { transform:scaleX(-1) rotate3d(0,1,0,60deg); }
  50%     { transform:scaleX(-1) rotate3d(0,1,0,-70deg); }
}

/* 蝴蝶本體 */
.bf-body {
  position:absolute;
  width:100%; height:100%;
  transform-style:preserve-3d;
  animation:bfFlutter 8s ease-in-out infinite;
}

/* 翅膀共用 */
.bf-wing {
  position:absolute;
  top:0;
  width:50%; height:100%;
  transform-style:preserve-3d;
  transform-origin:100% 50%; /* 從中間展開 */
}
.bf-wing svg {
  width:100%; height:100%;
  display:block;
}

/* 左翅 */
.bf-wing.left {
  left:0;
  transform-origin:100% 50%;
  animation:bfLeftWing 0.5s ease-in-out infinite;
}

/* 右翅：鏡像在右側 */
.bf-wing.right {
  right:0;
  transform-origin:0% 50%;
  animation:bfRightWing 0.5s ease-in-out infinite;
}

#brand { position:fixed; top:24px; right:28px; z-index:50; pointer-events:none; }
#brand img { width:72px; opacity:0; filter:brightness(0) invert(1); transition:opacity 2s ease; }
#guide { position:fixed; bottom:36px; left:50%; transform:translateX(-50%); z-index:50; pointer-events:none; text-align:center; opacity:0; transition:opacity 2s ease; }
#guide-text {
  font-family:'Georgia','宋體',serif; font-size:12px; letter-spacing:5px;
  color:rgba(255,245,250,0.55); white-space:nowrap;
  animation:breathe 5s ease-in-out infinite;
}
@keyframes breathe {
  0%,100%{opacity:0.4;transform:translateY(0);}
  50%{opacity:0.7;transform:translateY(-3px);}
}
#season-dots {
  position:fixed; bottom:68px; left:50%; transform:translateX(-50%);
  z-index:50; display:flex; gap:8px; pointer-events:none;
  opacity:0; transition:opacity 2s ease;
}
.dot { width:3px; height:3px; border-radius:50%; background:rgba(255,245,250,0.2); transition:background 1.5s ease,transform 1.5s ease; }
.dot.active { background:rgba(255,245,250,0.6); transform:scale(1.4); }
#pause-hint {
  position:fixed; top:24px; left:28px; z-index:50;
  font-family:'Georgia',serif; font-size:10px; letter-spacing:3px;
  color:rgba(255,245,250,0.2); pointer-events:none;
  opacity:0; transition:opacity 2s ease;
}
/* 過渡圖邊緣漸層柔化 */
.panel[data-transition] img {
  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 20%,
    black 80%,
    transparent 100%
  );
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 20%,
    black 80%,
    transparent 100%
  );
}

/* 右下角控制按鈕群組 */
#control-btn, #music-btn {
  position:fixed;
  bottom:28px;
  z-index:50;
  width:32px; height:32px;
  color:rgba(255,245,250,0.4);
  cursor:pointer;
  transition:color 0.3s ease, transform 0.2s ease;
}
#control-btn { right:68px; }
#music-btn   { right:28px; }
#control-btn:hover, #music-btn:hover {
  color:rgba(255,245,250,0.8);
  transform:scale(1.1);
}

/* 暫停提示文字隱藏 */
#pause-hint { display:none; }
</style>
</head>
<body>

<div id="scene-wrap">
  <div id="scene"><div id="panorama"></div></div>
</div>
<div id="vignette"></div>
<div id="edge-mask"></div>
<canvas id="canvas"></canvas>
<div id="svg-layer"></div>

<div id="brand"><img src="images/logo.svg" alt="心映好事"></div>
<div id="cursor"></div>

<!-- 音樂 -->
<audio id="bgm" loop preload="auto">
  <source src="images/Meditation2026_video.mp3" type="audio/mpeg">
</audio>

<!-- 整合控制按鈕（右下角） -->
<div id="control-btn" title="播放／暫停">
  <!-- 播放中狀態：顯示暫停icon -->
  <svg id="icon-playing" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.2"/>
    <rect x="9" y="8" width="2" height="8" rx="1" fill="currentColor"/>
    <rect x="13" y="8" width="2" height="8" rx="1" fill="currentColor"/>
  </svg>
  <!-- 暫停狀態：顯示播放icon -->
  <svg id="icon-stopped" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.2"/>
    <path d="M10 8.5l6 3.5-6 3.5V8.5z" fill="currentColor"/>
  </svg>
</div>

<!-- 音樂開關（右下角，在控制按鈕旁） -->
<div id="music-btn" title="音樂開／關">
  <svg id="icon-music-on" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9 18V6l12-2v12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.2"/>
    <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.2"/>
  </svg>
  <svg id="icon-music-off" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
    <path d="M9 18V6l12-2v12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="4 2"/>
    <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
    <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
    <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
</div>

<script>
// ═══════════════════════════════════════
// 圖片清單（webp格式，主畫面1920px + 過渡圖1000px）
// ═══════════════════════════════════════
const IMAGES = [
  // 春
  {file:'spring1.webp',   season:'spring', w:1920},
  {file:'spring_t1.webp', season:'spring', w:1000, transition:true},
  {file:'spring2.webp',   season:'spring', w:1920},
  {file:'spring_t2.webp', season:'spring', w:1000, transition:true},
  {file:'spring3.webp',   season:'spring', w:1920},
  {file:'spring_t3.webp', season:'spring', w:1000, transition:true},
  {file:'spring4.webp',   season:'spring', w:1920},
  {file:'spring_t4.webp', season:'spring', w:1000, transition:true, next:'summer'},
  // 夏
  {file:'summer1.webp',   season:'summer', w:1920},
  {file:'summer_t1.webp', season:'summer', w:1000, transition:true},
  {file:'summer2.webp',   season:'summer', w:1920},
  {file:'summer_t2.webp', season:'summer', w:1000, transition:true},
  {file:'summer3.webp',   season:'summer', w:1920},
  {file:'summer_t3.webp', season:'summer', w:1000, transition:true},
  {file:'summer4.webp',   season:'summer', w:1920},
  {file:'summer_t4.webp', season:'summer', w:1000, transition:true, next:'autumn'},
  // 秋
  {file:'autumn1.webp',   season:'autumn', w:1920},
  {file:'autumn_t1.webp', season:'autumn', w:1000, transition:true},
  {file:'autumn2.webp',   season:'autumn', w:1920},
  {file:'autumn_t2.webp', season:'autumn', w:1000, transition:true},
  {file:'autumn3.webp',   season:'autumn', w:1920},
  {file:'autumn_t3.webp', season:'autumn', w:1000, transition:true},
  {file:'autumn4.webp',   season:'autumn', w:1920},
  {file:'autumn_t4.webp', season:'autumn', w:1000, transition:true, next:'winter'},
  // 冬
  {file:'winter1.webp',   season:'winter', w:1920},
  {file:'winter_t1.webp', season:'winter', w:1000, transition:true},
  {file:'winter2.webp',   season:'winter', w:1920},
  {file:'winter_t2.webp', season:'winter', w:1000, transition:true},
  {file:'winter3.webp',   season:'winter', w:1920},
  {file:'winter_t3.webp', season:'winter', w:1000, transition:true},
  {file:'winter4.webp',   season:'winter', w:1920},
  {file:'winter_t4.webp', season:'winter', w:1000, transition:true, next:'spring'},
];

const FALLBACK = {
  spring:'linear-gradient(160deg,#e8d0e8,#f5e0f5,#dcc8e4)',
  summer:'linear-gradient(160deg,#1a1540,#2a2060,#151030)',
  autumn:'linear-gradient(160deg,#c89840,#d4b870,#b07820)',
  winter:'linear-gradient(160deg,#d8e8f4,#eaf4ff,#c8dcea)',
};

const OVERLAP = 300; // 過渡圖與主圖重疊px
const MAIN_W  = 1920;
const TRANS_W = 1000;
// 每個單元的實際推進距離
// 主圖推進: MAIN_W - OVERLAP = 1620
// 過渡圖推進: TRANS_W - OVERLAP = 700
// 一張主圖+一張過渡圖的推進: 1620 + 700 = 2320

// 計算每張圖的絕對 X 位置
function calcPositions(images){
  const positions = [];
  let x = 0;
  images.forEach((item, i)=>{
    positions.push(x);
    if(item.transition){
      x += TRANS_W - OVERLAP;
    } else {
      x += MAIN_W - OVERLAP;
    }
  });
  return { positions, totalWidth: x + OVERLAP };
}

const DOUBLED = [...IMAGES, ...IMAGES];
const { positions, totalWidth } = calcPositions(DOUBLED);
const singleSetWidth = totalWidth / 2;

// ═══════════════════════════════════════
// 建立全景（絕對定位）
// ═══════════════════════════════════════
const panorama = document.getElementById('panorama');
panorama.style.cssText = `
  position:absolute;
  top:0; left:0;
  height:100%;
  width:${totalWidth}px;
`;

DOUBLED.forEach((item, i)=>{
  const panel = document.createElement('div');
  panel.className='panel';
  panel.dataset.season = item.season;
  if(item.next) panel.dataset.next = item.next;
  if(item.transition) panel.dataset.transition = '1';

  const w = item.transition ? TRANS_W : MAIN_W;
  const z = item.transition ? 3 : 1;

  panel.style.cssText=`
    position:absolute;
    left:${positions[i]}px;
    top:0;
    width:${w}px;
    height:100%;
    overflow:hidden;
    z-index:${z};
  `;

  const img = new Image();
  img.src=`images/${item.file}`;
  img.alt=item.season;
  img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
  img.onerror=()=>{ img.remove(); panel.style.background=FALLBACK[item.season]; };

  panel.appendChild(img);
  panorama.appendChild(panel);
});

// ═══════════════════════════════════════
// Canvas 粒子（花瓣、螢火蟲、雪）
// ═══════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let canvasParticles = [];
let seasonAlpha = 1;

// ── 花瓣 ──────────────────────────────
class Petal {
  constructor(){ this.reset(true); }
  reset(init=false){
    this.x=Math.random()*canvas.width;
    this.y=init?Math.random()*canvas.height:-10;
    this.vx=-0.5+Math.random()*1.0;
    this.vy=0.8+Math.random()*1.2;
    this.rot=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.04;
    this.w=6+Math.random()*6; this.h=this.w*0.55;
    this.r=225+rnd(20); this.g=150+rnd(50); this.b=170+rnd(40);
    this.opacity=0; this.fadeIn=0.008+rnd(0.006);
    this.swayFreq=0.02+rnd(0.02); this.t=rnd(1000);
  }
  update(){
    this.t++; this.x+=this.vx+Math.sin(this.t*this.swayFreq)*0.4; this.y+=this.vy;
    this.rot+=this.rotSpeed; this.opacity=Math.min(1,this.opacity+this.fadeIn);
    if(this.y>canvas.height+15) this.reset();
  }
  draw(){
    const a=this.opacity*seasonAlpha; if(a<=0)return;
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    ctx.beginPath(); ctx.ellipse(0,0,this.w/2,this.h/2,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${a*0.75})`; ctx.fill(); ctx.restore();
  }
}

// ── 螢火蟲 ────────────────────────────
class Firefly {
  constructor(){
    // 限制在畫面下半部（50%~92%）
    this.x=rnd(canvas.width);
    this.y=canvas.height*(0.5+rnd(0.42));
    this.vx=0; this.vy=0; this.targetX=this.x; this.targetY=this.y;
    this.size=1.2+rnd(1.8); // 縮小：1.2~3px
    this.glowPhase=rnd(Math.PI*2); this.glowSpeed=0.02+rnd(0.03);
    this.changeTimer=0; this.changeInterval=80+Math.floor(rnd(120));
    this.r=200+Math.floor(rnd(55)); this.g=210+Math.floor(rnd(45)); this.b=80+Math.floor(rnd(80));
  }
  update(){
    this.glowPhase+=this.glowSpeed; this.changeTimer++;
    if(this.changeTimer>=this.changeInterval){
      this.changeTimer=0; this.changeInterval=80+Math.floor(rnd(120));
      const range=40+rnd(60); const angle=rnd(Math.PI*2);
      this.targetX=Math.max(20,Math.min(canvas.width-20,this.x+Math.cos(angle)*range));
      // 限制 y 在下半部
      this.targetY=Math.max(canvas.height*0.48,Math.min(canvas.height*0.92,this.y+Math.sin(angle)*range*0.5));
    }
    this.vx+=(this.targetX-this.x)*0.008; this.vy+=(this.targetY-this.y)*0.008;
    this.vx*=0.94; this.vy*=0.94; this.x+=this.vx; this.y+=this.vy;
  }
  draw(){
    const glow=0.5+0.5*Math.sin(this.glowPhase); const a=glow*seasonAlpha; if(a<=0)return;
    ctx.save();
    const grad=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*4);
    grad.addColorStop(0,`rgba(${this.r},${this.g},${this.b},${a*0.5})`);
    grad.addColorStop(1,`rgba(${this.r},${this.g},${this.b},0)`);
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*4,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,220,${a*0.9})`; ctx.fill(); ctx.restore();
  }
}

// ── 雪花 ──────────────────────────────
class Snowflake {
  constructor(){ this.reset(true); }
  reset(init=false){
    this.x=rnd(canvas.width); this.y=init?rnd(canvas.height):-8;
    this.vx=-0.3+rnd(0.6); this.vy=0.4+rnd(0.8);
    this.size=1.5+rnd(3); this.opacity=0; this.fadeIn=0.004+rnd(0.004);
    this.swayFreq=0.008+rnd(0.01); this.t=rnd(1000);
    this.brightness=210+Math.floor(rnd(45));
  }
  update(){
    this.t++; this.x+=this.vx+Math.sin(this.t*this.swayFreq)*0.2; this.y+=this.vy;
    this.opacity=Math.min(1,this.opacity+this.fadeIn);
    if(this.y>canvas.height+10) this.reset();
  }
  draw(){
    const a=this.opacity*seasonAlpha; if(a<=0)return;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.brightness},${this.brightness},${this.brightness+15},${a*0.55})`; ctx.fill();
  }
}

function rnd(n){ return Math.random()*n; }

// ═══════════════════════════════════════
// SVG 蝴蝶系統（DOM-based）
// ═══════════════════════════════════════
const svgLayer = document.getElementById('svg-layer');
let butterflyInstances = [];
let svgReady = false;

// 預載 SVG
const svgCache = {};
function loadSVG(name, src){
  return fetch(src)
    .then(r => r.text())
    .then(text => { svgCache[name] = text; })
    .catch(() => { svgCache[name] = null; });
}

// 蝴蝶1 觸鬚朝左 → 預設向左飛，向右飛時 scaleX(-1)
// 蝴蝶2 觸鬚朝右 → 預設向右飛，向左飛時 scaleX(-1)
const BUTTERFLY_DEFAULT_DIR = { '1': -1, '2': 1 };

class ButterflyDOM {
  constructor(num){
    this.num = num; // '1' 或 '2'
    this.defaultDir = BUTTERFLY_DEFAULT_DIR[num] || 1;
    this.size = 7 + rnd(3); // 7~10px
    this.x = rnd(window.innerWidth);
    this.y = window.innerHeight * (0.62 + rnd(0.28));
    this.initBezier();
    this.wingSpeed = 0.4 + rnd(0.3); // 快一點更像真蝴蝶
    this.maxOpacity = 0.25 + rnd(0.20);
    this.opacity = 0;
    this.fadeIn = 0.002 + rnd(0.003);
    this.el = null;
    this.alive = true;
    this._build();
  }

  initBezier(){
    const dir = Math.random()>0.5 ? 1 : -1;
    const dist = 120 + rnd(180);
    this.bz = {
      x0:this.x, y0:this.y,
      cx1:this.x+dir*dist*0.3, cy1:this.y+(-20+rnd(40)),
      cx2:this.x+dir*dist*0.7, cy2:this.y+(-20+rnd(40)),
      x1:this.x+dir*dist,      y1:this.y+(-10+rnd(20)),
    };
    this.bzT = 0;
    this.bzSpeed = 0.003 + rnd(0.003);
    this.flyDir = dir;
  }

  bezierPoint(t){
    const {x0,y0,cx1,cy1,cx2,cy2,x1,y1}=this.bz;
    const m=1-t;
    return {
      x:m*m*m*x0+3*m*m*t*cx1+3*m*t*t*cx2+t*t*t*x1,
      y:m*m*m*y0+3*m*m*t*cy1+3*m*t*t*cy2+t*t*t*y1,
    };
  }

  _build(){
    const leftSvg  = svgCache[`bf${this.num}_left`];
    const rightSvg = svgCache[`bf${this.num}_right`];
    const bodySvg  = svgCache[`bf${this.num}_body`];
    if(!leftSvg || !rightSvg) return;

    const sz = this.size * 2;
    const wrap = document.createElement('div');
    wrap.className = 'butterfly-wrap';
    wrap.style.cssText = `
      position:absolute;
      width:${sz}px; height:${sz}px;
      left:${this.x-this.size}px;
      top:${this.y-this.size}px;
      opacity:0;
      perspective:300px;
      transform-style:preserve-3d;
    `;

    // 本體容器（上下飄動）
    const body = document.createElement('div');
    body.className = 'bf-body';
    body.style.animationDelay    = `${-rnd(8)}s`;
    body.style.animationDuration = `${6+rnd(4)}s`;

    // 左翅
    const lw = document.createElement('div');
    lw.className = 'bf-wing left';
    lw.style.animationDuration = `${this.wingSpeed}s`;
    lw.style.animationDelay    = `${-rnd(this.wingSpeed)}s`;
    const lEl = document.createElement('div');
    lEl.innerHTML = leftSvg;
    const lSvg = lEl.querySelector('svg');
    if(lSvg) lSvg.style.cssText='width:100%;height:100%;display:block;';
    lw.appendChild(lSvg || lEl);

    // 右翅
    const rw = document.createElement('div');
    rw.className = 'bf-wing right';
    rw.style.animationDuration = `${this.wingSpeed}s`;
    rw.style.animationDelay    = `${-rnd(this.wingSpeed)}s`;
    const rEl = document.createElement('div');
    rEl.innerHTML = rightSvg;
    const rSvg = rEl.querySelector('svg');
    if(rSvg) rSvg.style.cssText='width:100%;height:100%;display:block;';
    rw.appendChild(rSvg || rEl);

    // 身體（疊在中間，不做翅膀動畫）
    if(bodySvg){
      const bd = document.createElement('div');
      bd.style.cssText=`position:absolute;top:0;left:25%;width:50%;height:100%;z-index:2;`;
      const bEl = document.createElement('div');
      bEl.innerHTML = bodySvg;
      const bSvg = bEl.querySelector('svg');
      if(bSvg) bSvg.style.cssText='width:100%;height:100%;display:block;';
      bd.appendChild(bSvg || bEl);
      body.appendChild(bd);
    }

    body.appendChild(lw);
    body.appendChild(rw);
    wrap.appendChild(body);
    svgLayer.appendChild(wrap);
    this.el = wrap;
  }

  update(){
    if(!this.el) return;
    this.bzT += this.bzSpeed;
    if(this.bzT >= 1){
      const pt = this.bezierPoint(1);
      this.x=pt.x; this.y=pt.y;
      if(this.x<-50) this.x=window.innerWidth+50;
      if(this.x>window.innerWidth+50) this.x=-50;
      this.y=Math.max(window.innerHeight*0.55, Math.min(window.innerHeight*0.92, this.y));
      this.initBezier();
      this.bz.x0=this.x; this.bz.y0=this.y;
      return;
    }
    const pt = this.bezierPoint(this.bzT);
    this.x=pt.x; this.y=pt.y;
    this.opacity=Math.min(this.maxOpacity, this.opacity+this.fadeIn);
    const alpha=this.opacity*seasonAlpha;
    this.el.style.left=(this.x-this.size)+'px';
    this.el.style.top =(this.y-this.size)+'px';
    this.el.style.opacity=alpha;
    const needFlip=(this.flyDir*this.defaultDir)<0;
    this.el.style.transform=needFlip?'scaleX(-1)':'scaleX(1)';
  }

  destroy(){
    if(this.el) this.el.remove();
    this.alive=false;
  }
}

function buildButterflies(){
  butterflyInstances.forEach(b => b.destroy());
  butterflyInstances = [];
  if(!svgCache['bf1_left'] && !svgCache['bf2_left']) return;
  const count = 3 + Math.floor(Math.random()*2);
  for(let i=0;i<count;i++){
    const num = (Math.random()>0.5 && svgCache['bf1_left']) ? '1' :
                (svgCache['bf2_left'] ? '2' : '1');
    butterflyInstances.push(new ButterflyDOM(num));
  }
}

function clearButterflies(){
  butterflyInstances.forEach(b => {
    if(b.el){ b.el.style.transition='opacity 1.5s ease'; b.el.style.opacity='0'; }
    setTimeout(()=>b.destroy(), 1600);
  });
  butterflyInstances = [];
}

class GinkgoLeaf {
  constructor(){ this.reset(true); }
  reset(init=false){
    this.x = rnd(canvas.width);
    this.y = init ? rnd(canvas.height) : -15;
    this.vx = -1.2 + rnd(2.4);
    this.vy = 0.9 + rnd(1.6);
    this.rot = rnd(Math.PI*2);
    this.rotSpeed = (Math.random()-0.5) * 0.07;
    this.size = 7 + rnd(8); // 縮小50%：原本15~30，現在7~15px
    // SVG viewBox 是 1080×1080，需要縮放到 this.size
    this.scale = this.size / 1080;
    this.opacity = 0; this.fadeIn = 0.006+rnd(0.006);
    this.swayFreq = 0.015+rnd(0.015); this.t = rnd(1000);
    this.hue = 42 + rnd(15);
    this.sat = 80 + rnd(15);
    this.lit = 55 + rnd(15);
  }
  update(){
    this.t++;
    this.x += this.vx + Math.sin(this.t*this.swayFreq)*0.5;
    this.y += this.vy;
    this.rot += this.rotSpeed;
    this.opacity = Math.min(1, this.opacity+this.fadeIn);
    if(this.y > canvas.height+20) this.reset();
  }
  draw(){
    const a = this.opacity * seasonAlpha;
    if(a <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    if(ginkgoPath){
      // 用真實 SVG path 繪製
      ctx.scale(this.scale, this.scale);
      ctx.fillStyle = `hsla(${this.hue},${this.sat}%,${this.lit}%,${a*0.85})`;
      ctx.fill(ginkgoPath);
    } else {
      // 備用扇形
      const s = this.size;
      ctx.fillStyle = `hsla(${this.hue},${this.sat}%,${this.lit}%,${a*0.85})`;
      ctx.beginPath();
      ctx.moveTo(0, s*0.5);
      ctx.quadraticCurveTo(-s*0.7, s*0.1, -s*0.6, -s*0.3);
      ctx.quadraticCurveTo(-s*0.2, -s*0.7, 0, -s*0.5);
      ctx.quadraticCurveTo(s*0.2, -s*0.7, s*0.6, -s*0.3);
      ctx.quadraticCurveTo(s*0.7, s*0.1, 0, s*0.5);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ── 光塵粒子（夏天白天）────────────────
class DustParticle {
  constructor(){ this.reset(true); }
  reset(init=false){
    this.x = rnd(canvas.width);
    this.y = init ? rnd(canvas.height) : canvas.height * (0.3 + rnd(0.7));
    this.size = 1 + rnd(2.5);
    this.vx = (-0.3 + rnd(0.6)) * 0.5;
    this.vy = (-0.2 + rnd(0.4)) * 0.3;
    this.glowPhase = rnd(Math.PI*2);
    this.glowSpeed = 0.01 + rnd(0.02);
    this.baseOpacity = 0.2 + rnd(0.35);
    this.opacity = 0;
    this.fadeIn = 0.003 + rnd(0.004);
    this.life = 0;
    this.maxLife = 200 + Math.floor(rnd(300));
    // 金白色系
    this.r = 240 + Math.floor(rnd(15));
    this.g = 220 + Math.floor(rnd(25));
    this.b = 160 + Math.floor(rnd(60));
  }
  update(){
    this.life++;
    this.glowPhase += this.glowSpeed;
    this.x += this.vx;
    this.y += this.vy;
    const lifeRatio = this.life / this.maxLife;
    if(lifeRatio < 0.1){
      this.opacity = Math.min(this.baseOpacity, this.opacity + this.fadeIn);
    } else if(lifeRatio > 0.8){
      this.opacity = Math.max(0, this.opacity - this.fadeIn * 0.5);
    }
    if(this.life >= this.maxLife) this.reset();
    if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
  }
  draw(){
    const glow = 0.6 + 0.4 * Math.sin(this.glowPhase);
    const a = this.opacity * glow * seasonAlpha;
    if(a <= 0) return;
    // 外光暈
    const grad = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*3);
    grad.addColorStop(0, `rgba(${this.r},${this.g},${this.b},${a*0.5})`);
    grad.addColorStop(1, `rgba(${this.r},${this.g},${this.b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size*3, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    // 核心
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,248,220,${a*0.8})`;
    ctx.fill();
  }
}

// 季節粒子配置
// ═══════════════════════════════════════
const SEASON_CFG = {
  spring:  { canvas:[{cls:Petal,count:14}],         svgButterly:true  },
  summer:  { canvas:[{cls:DustParticle,count:25}],  svgButterly:false },
  autumn:  { canvas:[{cls:GinkgoLeaf,count:16}],    svgButterly:false },
  winter:  { canvas:[{cls:Snowflake,count:28}],     svgButterly:false },
  // 夏3 專用（星空螢火蟲）
  summer3: { canvas:[{cls:DustParticle,count:10},{cls:Firefly,count:18}], svgButterly:false },
};

let activeSeason = 'spring';

function buildCanvasParticles(season){
  canvasParticles = [];
  const cfg = SEASON_CFG[season];
  if(!cfg) return;
  cfg.canvas.forEach(({cls,count})=>{
    for(let i=0;i<count;i++) canvasParticles.push(new cls());
  });
}

function changeSeason(newSeason){
  if(newSeason === activeSeason) return;
  activeSeason = newSeason;
  updateDots();
  // 淡出
  let fadeOut = setInterval(()=>{
    seasonAlpha = Math.max(0, seasonAlpha-0.05);
    if(seasonAlpha<=0){
      clearInterval(fadeOut);
      // 清蝴蝶
      clearButterflies();
      // 重建 canvas 粒子
      buildCanvasParticles(newSeason);
      // 春天加蝴蝶
      if(newSeason==='spring' && svgReady) buildButterflies();
      // 淡入
      let fadeIn = setInterval(()=>{
        seasonAlpha = Math.min(1, seasonAlpha+0.04);
        if(seasonAlpha>=1) clearInterval(fadeIn);
      },30);
    }
  },30);
}

// ═══════════════════════════════════════
// 主 loop
// ═══════════════════════════════════════
const TOTAL_DURATION = 870000;
let startTime=null, paused=false, pauseAccum=0, pauseAt=null;
let currentDetectedSeason='spring';

function detectSeasonByX(scrollX){
  const x = scrollX % singleSetWidth;
  for(let i=0; i<IMAGES.length; i++){
    const left = positions[i];
    const w = IMAGES[i].transition ? TRANS_W : MAIN_W;
    const right = left + w;
    if(x >= left && x < right){
      const item = IMAGES[i];
      if(item.next){
        const progress = (x - left) / w;
        return progress > 0.5 ? item.next : item.season;
      }
      return item.season;
    }
  }
  return IMAGES[0].season;
}

// RWD 縮放：縮放 scene-wrap 填滿螢幕
const sceneWrap = document.getElementById('scene-wrap');
function applyRWD(){
  if(!sceneWrap) return;
  const scaleX = window.innerWidth  / 1920;
  const scaleY = window.innerHeight / 1080;
  const scale  = Math.max(scaleX, scaleY);
  sceneWrap.style.transform = `translate(-50%,-50%) scale(${scale})`;
}
applyRWD();
window.addEventListener('resize', applyRWD);

function loop(ts){
  if(!startTime) startTime=ts;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!paused){
    const elapsed=(ts-startTime)-pauseAccum;
    const progress=(elapsed%TOTAL_DURATION)/TOTAL_DURATION;
    const x=-(progress*singleSetWidth);
    panorama.style.transform=`translateX(${x}px)`;

    const season = detectSeasonByX(Math.abs(x));
    if(season !== currentDetectedSeason){
      currentDetectedSeason = season;
      changeSeason(season);
    }
  }

  canvasParticles.forEach(p=>{ p.update(); p.draw(); });
  butterflyInstances.forEach(b=>b.update());

  requestAnimationFrame(loop);
}

const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('music-btn');
const iconMusicOn = document.getElementById('icon-music-on');
const iconMusicOff = document.getElementById('icon-music-off');
let musicPlaying = false;

function toggleMusic(){
  if(musicPlaying){
    bgm.pause();
    iconMusicOn.style.display='none';
    iconMusicOff.style.display='block';
    musicPlaying=false;
  } else {
    bgm.play().catch(()=>{});
    iconMusicOn.style.display='block';
    iconMusicOff.style.display='none';
    musicPlaying=true;
  }
}
musicBtn.addEventListener('click', e=>{ e.stopPropagation(); toggleMusic(); });

const iconStopped = document.getElementById('icon-stopped');

controlBtn.addEventListener('click', e=>{
  e.stopPropagation();

    iconPlaying.style.display='none';
    iconStopped.style.display='block';

});
function togglePause(){
  if(!paused){ paused=true; pauseAt=performance.now(); document.getElementById('pause-hint').textContent='點擊繼續'; }
  else { paused=false; pauseAccum+=performance.now()-pauseAt; document.getElementById('pause-hint').textContent='點擊暫停'; }
}
document.addEventListener('click', togglePause);
document.addEventListener('touchstart', e=>{ e.preventDefault(); togglePause(); },{passive:false});
